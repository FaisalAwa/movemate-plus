[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/services"
  to = "/services/"
  status = 301
  force = true

[[redirects]]
  from = "/gallery"
  to = "/gallery/"
  status = 301
  force = true

[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/contact"
  to = "/contact/"
  status = 301
  force = true

[[redirects]]
  from = "/booking"
  to = "/booking/"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
